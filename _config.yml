# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# Site Settings
locale: "en-US"
title: "Moses Karanja Thuo"
title_separator: "|"
subtitle: "Cybersecurity & Digital Forensics Specialist"
name: "Moses Karanja Thuo"
description: "Cybersecurity & Digital Forensics Specialist | Ethical Hacker | Threat Detection & Vulnerability Analysis"
url: "https://tmkaranja.github.io"
repository: "ThuoKaranja/tmkaranja.github.io"

# THIS IS CRITICAL - Must include _pages
include:
  - _pages
  - assets

# Author Settings
author:
  name: "Moses Karanja Thuo"
  avatar: "/assets/images/moses-thuo.jpg"
  bio: "Cybersecurity & Digital Forensics Specialist | Ethical Hacker"
  location: "Kitale, Kenya"
  email: "moseskanji254@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:moseskanji254@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/thuo-cyberdefense"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/thuo-cyberdefense"

# Defaults - CRITICAL for page generation
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: true
      sidebar:
        nav: "main"
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  certifications:
    output: true
    permalink: /:collection/:path/

# Permalink structure
permalink: /:categories/:title/

# Sidebar Navigation
sidebar:
  nav: "main"
