# Site settings
title: "Moses Karanja Thuo"
email: "moseskanji254@gmail.com"
description: "Cybersecurity & Digital Forensics Professional | Ethical Hacker"
github_username: "ThuoKaranja"

# Clean Default Layout
minimal_mistakes_skin: "default"
search: true

# Build settings
markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: "Africa/Nairobi"

include:
  - _pages

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# Profile Sidebar Configuration
author:
  name     : "Moses Karanja Thuo"
  avatar   : "/assets/images/profile.jpg"
  bio      : "Cybersecurity and Digital Forensics professional specializing in penetration testing, incident response, and threat analysis."
  location : "Kitale, Kenya"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:moseskanji254@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/cyberdefend254"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/cyberdefend254"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
