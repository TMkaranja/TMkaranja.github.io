# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "mint" # Start with mint, then customize with CSS

# Modern Site Settings
locale: "en-US"
title: "Your Name"
title_separator: "•"
subtitle: "Full Stack Developer & UI/UX Designer"
name: "Your Name"
description: "Crafting digital experiences that make a difference. Specializing in modern web development and user-centered design."
url: "https://username.github.io"
repository: "username/username.github.io"
words_per_minute: 200

# Professional Author Settings
author:
  name: "Your Name"
  avatar: "/assets/images/profile-professional.jpg"
  bio: "🚀 Building the future, one commit at a time. Passionate about clean code and stunning interfaces."
  location: "San Francisco, CA"
  email: "hello@yourdomain.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:hello@yourdomain.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin-in"
      url: "https://linkedin.com/in/yourusername"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter"
      url: "https://twitter.com/yourusername"
    - label: "Dribbble"
      icon: "fab fa-fw fa-dribbble"
      url: "https://dribbble.com/yourusername"

# Modern Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourusername"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:hello@yourdomain.com"

# Default Layout Settings
defaults:
  # Home page
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
      sidebar:
        nav: "main"
      classes: wide
      
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      classes: wide

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# SEO & Analytics
google_analytics: "UA-XXXXXXXXX-X" # Replace with your GA4 ID
twitter:
  username: "yourusername"

# Collections for Projects
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
