# Theme Settings
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark" # Dark theme perfect for cybersecurity

# Site Settings
locale: "en-US"
title: "Moses Karanja Thuo"
title_separator: "|"
subtitle: "Cybersecurity & Digital Forensics Specialist"
name: "Moses Karanja Thuo"
description: "Cybersecurity & Digital Forensics Specialist | Ethical Hacker | Threat Detection & Vulnerability Analysis | Protecting digital assets through proactive security measures"
url: "https://tmkaranja.github.io"
repository: "ThuoKaranja/tmkaranja.github.io"
words_per_minute: 200

# Author Settings
author:
  name: "Moses Karanja Thuo"
  avatar: "/assets/images/moses-thuo.jpg"
  bio: "🔐 Securing the digital frontier. Ethical hacker & cybersecurity specialist passionate about protecting organizations from evolving threats."
  location: "Kitale, Kenya"
  email: "moseskanji254@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:moseskanji254@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin-in"
      url: "https://linkedin.com/in/thuo-cyberdefense"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"
    - label: "Phone"
      icon: "fas fa-fw fa-phone"
      url: "tel:+254792154091"

# Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/thuo-cyberdefense"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:moseskanji254@gmail.com"

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: true
      sidebar:
        nav: "main"
      classes: wide
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Collections
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  certifications:
    output: true
    permalink: /certifications/:path/
