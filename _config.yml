# =============================================
# THEME SETTINGS
# =============================================
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "dark"

# =============================================
# SITE SETTINGS
# =============================================
locale: "en-US"
title: "Moses Karanja Thuo"
title_separator: "•"
subtitle: "Cybersecurity & Digital Forensics Specialist"
name: "Moses Karanja Thuo"
description: "Cybersecurity & Digital Forensics Specialist | Ethical Hacker | Threat Detection & Vulnerability Analysis"
url: "https://tmkaranja.github.io"
repository: "ThuoKaranja/tmkaranja.github.io"
words_per_minute: 200

# =============================================
# AUTHOR INFORMATION
# =============================================
author:
  name                : "Moses Karanja Thuo"
  avatar              : "/assets/images/moses-thuo.jpg"
  bio                 : "Cybersecurity & Digital Forensics Specialist | Ethical Hacker | Securing digital assets through proactive defense"
  location            : "Kitale, Kenya"
  email               : "moseskanji254@gmail.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:moseskanji254@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/thuo-cyberdefense"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"

# =============================================
# FOOTER
# =============================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ThuoKaranja"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/thuo-cyberdefense"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:moseskanji254@gmail.com"

# =============================================
# INCLUDES
# =============================================
include:
  - _pages

# =============================================
# DEFAULTS
# =============================================
defaults:
  # Pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
      share: false
      classes: wide
      sidebar:
        nav: "main"
  # Posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

# =============================================
# PLUGINS
# =============================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
